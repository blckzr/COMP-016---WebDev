<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | GameBlitz</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/products.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="nav-container">
        <div class="logo">Game<span>Blitz</span></div>
        <nav>
          <ul>
            <li><a href="index.html" class="nav-btn">Home</a></li>
            <li><a href="products.html" class="nav-btn active">Products</a></li>
            <li><a href="contact.html" class="nav-btn">Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h2>Game Collection</h2>

      <div class="search-container">
        <input type="text" id="gameSearch" placeholder="Search for a game..." />
        <p id="searchFeedback"></p>
      </div>

      <div id="productGrid" class="product-grid">
        <div class="product-card" data-name="Elden Ring">
          <img src="assets/img/elden_ring_shadow.jpg" alt="Elden Ring" />
          <h4>Elden Ring</h4>
        </div>
        <div class="product-card" data-name="Final Fantasy VII">
          <img src="assets/img/ff7rebirth.jpg" alt="FF7" />
          <h4>Final Fantasy VII</h4>
        </div>
        <div class="product-card" data-name="Spider-Man 2">
          <img src="assets/img/spider-man-2.jpg" alt="Spider-Man 2" />
          <h4>Spider-Man 2</h4>
        </div>
        <div class="product-card" data-name="Monster Hunter Wilds">
          <img
            src="assets/img/monsterhunterwilds.jpg"
            alt="Monster Hunter Wilds"
          />
          <h4>Monster Hunter Wilds</h4>
        </div>
        <div class="product-card" data-name="Cyberpunk 2077">
          <img src="assets/img/cyberpunk.jpg" alt="Cyberpunk 2077" />
          <h4>Cyberpunk 2077</h4>
        </div>
        <div class="product-card" data-name="Resident Evil Requiem">
          <img src="assets/img/re9.jpg" alt="Resident Evil Requiem" />
          <h4>Resident Evil Requiem</h4>
        </div>
        <div class="product-card" data-name="Hollow Knight Silksong">
          <img
            src="assets/img/hollowknightsilksong.jpg"
            alt="Hollow Knight Silksong"
          />
          <h4>Hollow Knight Silksong</h4>
        </div>
        <div class="product-card" data-name="Clair Obscur: Expedition 33">
          <img
            src="assets/img/clair-obscur.jpg"
            alt="Clair Obscur: Expedition 33"
          />
          <h4>Clair Obscur: Expedition 33</h4>
        </div>
      </div>
    </main>

    <script src="js/products.js"></script>
  </body>
</html>
